name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  lint-and-syntax:
    name: Lint & syntax check (Python + JS)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Python syntax check (compileall)
        run: python -m compileall -q backend

      - name: Install flake8
        run: pip install flake8

      - name: Flake8 - critical errors only (syntax, undefined names)
        run: flake8 backend --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: JavaScript syntax check
        run: |
          for f in frontend/static/*.js; do
            echo "Checking $f"
            node --check "$f"
          done

      - name: Sanity import check (FastAPI app loads)
        working-directory: backend
        run: python -c "import main; print('main.py imported OK, app =', main.app)"

  docker-build:
    name: Docker build test
    runs-on: ubuntu-latest
    needs: lint-and-syntax
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image (no push)
        run: docker build -t mt-geoapp:ci-test .
